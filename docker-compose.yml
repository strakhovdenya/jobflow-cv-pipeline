services:
  app:
    build: ./apps/api
    container_name: jobflow_app
    ports:
      - "${PORT:-3000}:3000"
    env_file: ./apps/api/.env
    environment:
      # Override DATABASE_URL so the app reaches postgres by its Docker service
      # name ("postgres") instead of "localhost" which is only valid on the host.
      # Port 5432 is the container-internal port; ${POSTGRES_PORT} is the *host*
      # mapping and must NOT be used here (it may differ, e.g. 5433).
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - postgres
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        # Baked into the client bundle at build time (Next.js NEXT_PUBLIC_*
        # rule) — this container's Server Component fetches run inside the
        # Docker network, so it must resolve the "app" service name, not
        # "localhost". Override via the root .env if the network topology
        # differs (e.g. a reverse proxy in front of "app").
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://app:3000}
    container_name: jobflow_web
    ports:
      - "${WEB_PORT:-3001}:3000"
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: jobflow_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jobflow_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

volumes:
  postgres_data:
